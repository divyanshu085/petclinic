name: Java CI Pipeline (Maven + Trivy)

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:

  build-test-checkstyle:
    name: Build + Test + Checkstyle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Give Maven wrapper permission
        run: chmod +x mvnw

      - name: Build + Test + Checkstyle
        run: ./mvnw clean verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-petclinic-jar
          path: target/*.jar


  security-scan-trivy:
    name: Trivy Security Scan (FS + Dependency + Config)
    runs-on: ubuntu-latest
    needs: build-test-checkstyle

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan (Repo)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy Report to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  Build_Docker_image_publish_to_dockerhub:
    name: Build Docker image and publish to Docker Hub
    runs-on: ubuntu-latest
    needs: build-test-checkstyle

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Give Maven wrapper permission
        run: chmod +x mvnw

      - name: Build Docker image and publish to Docker Hub
        run: ./mvnw clean package -DskipTests