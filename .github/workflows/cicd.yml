name: Java CI Pipeline (Maven + Trivy)

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-checkstyle:
    name: Build + Test + Checkstyle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Give Maven wrapper permission
        run: chmod +x mvnw

      - name: Build + Test + Checkstyle
        run: ./mvnw clean verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-petclinic-jar
          path: target/*.jar


  security-scan-trivy:
    name: Trivy Security Scan (Filesystem + JAR)
    runs-on: ubuntu-latest
    needs: build-test-checkstyle

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build project (skip tests for scan input)
        run: ./mvnw clean package -DskipTests

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.55.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.55.0_Linux-64bit.deb

      - name: Run Trivy Filesystem Scan
        run: |
          trivy fs --exit-code 1 --severity CRITICAL,HIGH .