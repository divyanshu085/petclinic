name: Java CI Pipeline (Maven + Trivy)

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:

  build-test-checkstyle:
    name: Build + Test + Checkstyle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Give Maven wrapper permission
        run: chmod +x mvnw

      - name: Build + Test + Checkstyle
        run: ./mvnw clean verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-petclinic-jar
          path: target/*.jar


  security-scan-trivy:
    name: Trivy Security Scan (FS + Dependency + Config)
    runs-on: ubuntu-latest
    needs: build-test-checkstyle

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan (Repo)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy Report to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  Build_Docker_Image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: security-scan-trivy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Give Maven wrapper permission
        run: chmod +x mvnw

      - name: Build and Save Docker Image
        run: |
          docker build -t petapp .
          docker save -o petclinic-app.jar petapp

      - name: Upload Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: petapp
          path: petclinic-app.jar

  push-to-ecr:
    name: Push Docker Image to AWS ECR
    runs-on: ubuntu-latest
    needs: Build_Docker_Image
    environment: myvalues
    env:
      AWS_REGION: us-east-1
      ECR_REPOSITORY: petclinicimage
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY .

      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPOSITORY:latest \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest

      - name: Push Docker Image to ECR
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest
  
  